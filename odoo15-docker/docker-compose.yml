
services:

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:14
    platform: linux/amd64
    container_name: odoo15_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks:
      - odoo_net

  # ─── Odoo 15 Community ────────────────────────────────────────────────────
  odoo:
    image: odoo:15.0
    platform: linux/amd64
    container_name: odoo15_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      # Odoo persistent data (filestore, sessions)
      - odoo_web_data:/var/lib/odoo
      # Our custom config
      - ./odoo.conf:/etc/odoo/odoo.conf
      # Mount custom addons folder (om_hospital lives here)
      - ./custom_addons:/mnt/extra-addons
    networks:
      - odoo_net

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  odoo_db_data:
  odoo_web_data:

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  odoo_net:
    driver: bridge
